name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: gradle
        cache-dependency-path: |
          **/gradle-wrapper.properties
          **/build.gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: List build outputs
      if: always()
      run: |
        echo "Looking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null | head -20
        echo "Build outputs directory:"
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "Debug directory not found"

    - name: Upload APK Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30

    - name: Show Artifact Upload Result
      if: always()
      run: echo "Artifact upload step completed"
